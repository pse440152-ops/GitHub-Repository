<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘의 운세</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(ellipse at top, #1a0533 0%, #0d0221 60%, #000 100%); font-family: 'Segoe UI', 'Malgun Gothic', sans-serif; color: #f0e6ff; overflow: hidden; }
    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .star { position: absolute; border-radius: 50%; background: #fff; animation: twinkle var(--d, 3s) ease-in-out infinite alternate; }
    @keyframes twinkle { from { opacity: 0.1; transform: scale(1); } to { opacity: 0.9; transform: scale(1.4); } }
    .container { position: relative; z-index: 1; text-align: center; padding: 2rem 1.5rem; max-width: 480px; width: 100%; }
    h1 { font-size: 1.1rem; letter-spacing: 0.3em; color: #c9a8ff; margin-bottom: 0.4rem; }
    .date-label { font-size: 0.8rem; color: #8866bb; letter-spacing: 0.15em; margin-bottom: 2.5rem; }
    .card { background: linear-gradient(145deg, rgba(80,30,120,0.55), rgba(20,5,50,0.7)); border: 1px solid rgba(180,120,255,0.25); border-radius: 20px; padding: 2.2rem 2rem; backdrop-filter: blur(12px); box-shadow: 0 0 40px rgba(140,60,255,0.15); }
    .crystal-ball { font-size: 5rem; line-height: 1; margin-bottom: 1.2rem; filter: drop-shadow(0 0 18px rgba(180,120,255,0.7)); animation: float 4s ease-in-out infinite; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    .zodiac-row { display: flex; justify-content: center; gap: 0.6rem; flex-wrap: wrap; margin-bottom: 1.8rem; }
    .zodiac-btn { background: rgba(120,60,200,0.2); border: 1px solid rgba(180,120,255,0.3); color: #d8b4ff; border-radius: 50px; padding: 0.35rem 0.85rem; font-size: 0.78rem; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .zodiac-btn:hover, .zodiac-btn.active { background: rgba(160,80,255,0.45); border-color: rgba(200,150,255,0.7); color: #fff; box-shadow: 0 0 12px rgba(160,80,255,0.4); }
    .fortune-box { min-height: 160px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; }
    .fortune-text { font-size: 1.05rem; line-height: 1.8; color: #e8d8ff; opacity: 0; transform: translateY(10px); transition: opacity 0.6s ease, transform 0.6s ease; }
    .fortune-text.visible { opacity: 1; transform: translateY(0); }
    .scores { display: flex; justify-content: center; gap: 1.4rem; margin-top: 0.8rem; opacity: 0; transition: opacity 0.6s ease 0.3s; }
    .scores.visible { opacity: 1; }
    .score-item { display: flex; flex-direction: column; align-items: center; gap: 0.3rem; font-size: 0.72rem; color: #a88acc; }
    .score-bar { width: 44px; height: 6px; background: rgba(120,60,200,0.3); border-radius: 99px; overflow: hidden; }
    .score-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #a05fff, #f0c0ff); width: 0%; transition: width 0.8s ease 0.5s; }
    .score-num { font-size: 0.85rem; font-weight: 600; color: #d4a8ff; }
    .hint { font-size: 0.8rem; color: #7a5a99; }
    .btn-draw { margin-top: 1.8rem; padding: 0.75rem 2.2rem; background: linear-gradient(135deg, #7020d0, #b040ff); border: none; border-radius: 50px; color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; box-shadow: 0 4px 20px rgba(140,40,255,0.4); transition: all 0.25s; }
    .btn-draw:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(160,60,255,0.5); }
    .lucky-items { display: flex; justify-content: center; gap: 1.2rem; margin-top: 1rem; font-size: 0.78rem; color: #a88acc; opacity: 0; transition: opacity 0.6s ease 0.5s; flex-wrap: wrap; }
    .lucky-items.visible { opacity: 1; }
    footer { margin-top: 1.8rem; font-size: 0.7rem; color: #4a3060; letter-spacing: 0.1em; }
  </style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="container">
  <h1>✦ 오늘의 운세 ✦</h1>
  <div class="date-label" id="dateLabel"></div>
  <div class="card">
    <div class="crystal-ball">🔮</div>
    <div class="zodiac-row" id="zodiacRow"></div>
    <div class="fortune-box">
      <div class="fortune-text" id="fortuneText"><div class="hint">별자리를 선택하고 운세를 뽑아보세요</div></div>
      <div class="scores" id="scores">
        <div class="score-item"><div>💰 금전</div><div class="score-bar"><div class="score-fill" id="moneyBar"></div></div><div class="score-num" id="moneyNum"></div></div>
        <div class="score-item"><div>❤️ 애정</div><div class="score-bar"><div class="score-fill" id="loveBar"></div></div><div class="score-num" id="loveNum"></div></div>
        <div class="score-item"><div>💼 직업</div><div class="score-bar"><div class="score-fill" id="workBar"></div></div><div class="score-num" id="workNum"></div></div>
        <div class="score-item"><div>🌿 건강</div><div class="score-bar"><div class="score-fill" id="healthBar"></div></div><div class="score-num" id="healthNum"></div></div>
      </div>
      <div class="lucky-items" id="luckyItems">
        <div>🎨 행운의 색 <strong id="luckyColor"></strong></div>
        <div>🔢 행운의 숫자 <strong id="luckyNumber"></strong></div>
        <div>💎 행운의 아이템 <strong id="luckyItem"></strong></div>
      </div>
    </div>
    <button class="btn-draw" onclick="drawFortune()">운세 뽑기 ✨</button>
  </div>
  <footer>별의 기운이 당신과 함께하기를 🌙</footer>
</div>
<script>
  const starContainer = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div'); s.className = 'star';
    const sz = Math.random()*2.5+0.5;
    s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*3+1.5).toFixed(1)}s;animation-delay:${(Math.random()*3).toFixed(1)}s;`;
    starContainer.appendChild(s);
  }
  const now = new Date();
  document.getElementById('dateLabel').textContent = `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일`;
  const zodiacs = [
    {sign:'양자리',emoji:'♈'},{sign:'황소자리',emoji:'♉'},{sign:'쌍둥이자리',emoji:'♊'},
    {sign:'게자리',emoji:'♋'},{sign:'사자자리',emoji:'♌'},{sign:'처녀자리',emoji:'♍'},
    {sign:'천칭자리',emoji:'♎'},{sign:'전갈자리',emoji:'♏'},{sign:'사수자리',emoji:'♐'},
    {sign:'염소자리',emoji:'♑'},{sign:'물병자리',emoji:'♒'},{sign:'물고기자리',emoji:'♓'},
  ];
  const fortunes = [
    '오늘은 뜻밖의 인연이 찾아올 수 있는 날입니다. 열린 마음으로 새로운 만남을 환영하세요.',
    '작은 노력이 큰 결실로 이어지는 날입니다. 미루어 두었던 일을 지금 시작해 보세요.',
    '오늘은 직감을 믿으세요. 머릿속에 떠오르는 아이디어가 황금 같은 기회일 수 있습니다.',
    '주변 사람들과의 소통이 중요한 날입니다. 진심 어린 한마디가 관계를 더욱 단단하게 만들어 줍니다.',
    '오늘은 재정적으로 신중한 판단이 필요합니다. 충동 구매는 잠시 미루고 계획적으로 행동하세요.',
    '오래된 친구에게 연락해보세요. 반가운 소식과 함께 활력을 얻을 수 있는 날입니다.',
    '오늘 당신의 매력이 빛을 발합니다. 자신감을 가지고 하고 싶은 것에 도전해 보세요.',
    '차분하게 한 걸음씩 나아가는 날입니다. 조급함을 내려놓으면 원하는 것이 자연스럽게 따라옵니다.',
    '창의적인 에너지가 넘치는 하루입니다. 예술적 활동이나 취미에 시간을 투자해 보세요.',
    '오늘은 건강 관리에 특별한 주의를 기울이세요. 충분한 수분 섭취와 휴식이 큰 도움이 됩니다.',
    '예상치 못한 행운이 찾아오는 날입니다. 복권이나 게임을 가볍게 즐겨 보는 것도 좋습니다.',
    '오늘은 내면의 목소리에 귀 기울이세요. 자신을 돌아보는 시간이 앞으로의 방향을 밝혀줍니다.',
  ];
  const colors = ['빨강','파랑','초록','보라','금색','흰색','하늘색','분홍','오렌지','노랑','민트','라벤더'];
  const items  = ['책','꽃','수정','열쇠','동전','깃털','초','향수','거울','조약돌','편지','반지'];
  let selected = null;
  const row = document.getElementById('zodiacRow');
  zodiacs.forEach((z, i) => {
    const btn = document.createElement('button'); btn.className = 'zodiac-btn';
    btn.textContent = `${z.emoji} ${z.sign}`;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.zodiac-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active'); selected = i; resetDisplay();
    });
    row.appendChild(btn);
  });
  function resetDisplay() {
    ['fortuneText','scores','luckyItems'].forEach(id => document.getElementById(id).classList.remove('visible'));
    setTimeout(() => {
      document.getElementById('fortuneText').innerHTML = '<div class="hint">운세 뽑기 버튼을 눌러보세요</div>';
      document.getElementById('fortuneText').classList.add('visible');
    }, 200);
  }
  function rng(seed) { const x = Math.sin(seed)*10000; return x-Math.floor(x); }
  function drawFortune() {
    const ft = document.getElementById('fortuneText');
    if (selected === null) { ft.innerHTML='<div class="hint">먼저 별자리를 선택해 주세요 ☝️</div>'; ft.classList.add('visible'); return; }
    const seed = now.getFullYear()*10000+(now.getMonth()+1)*100+now.getDate()+selected*37;
    const money=Math.floor(rng(seed+1)*41)+60, love=Math.floor(rng(seed+2)*41)+60,
          work=Math.floor(rng(seed+3)*41)+60, health=Math.floor(rng(seed+4)*41)+60;
    ft.classList.remove('visible');
    setTimeout(() => {
      ft.innerHTML=`<div style="font-size:1.3rem">${zodiacs[selected].emoji} <strong>${zodiacs[selected].sign}</strong></div><div>${fortunes[Math.floor(rng(seed)*12)]}</div>`;
      ft.classList.add('visible');
      ['moneyNum','loveNum','workNum','healthNum'].forEach((id,i)=>document.getElementById(id).textContent=[money,love,work,health][i]);
      document.getElementById('scores').classList.add('visible');
      setTimeout(()=>{
        document.getElementById('moneyBar').style.width=money+'%';
        document.getElementById('loveBar').style.width=love+'%';
        document.getElementById('workBar').style.width=work+'%';
        document.getElementById('healthBar').style.width=health+'%';
      },100);
      document.getElementById('luckyColor').textContent=colors[Math.floor(rng(seed+5)*12)];
      document.getElementById('luckyNumber').textContent=Math.floor(rng(seed+7)*99)+1;
      document.getElementById('luckyItem').textContent=items[Math.floor(rng(seed+6)*12)];
      document.getElementById('luckyItems').classList.add('visible');
    },300);
  }
</script>
</body>
</html>
